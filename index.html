<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PBL · Tous les dépôts (exploration complète)</title>

    <!-- MathJax 3 (LaTeX) -->
    <script>
        MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            svg: { fontCache: 'global' }
        };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async>
    </script>

    <style>
        /* ----- RESET & GLOBAL (fond clair) ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            background: #f5f7fc;
            color: #1e293b;
            min-height: 100vh;
            padding: 2rem 1.5rem 4rem;
            position: relative;
            overflow-x: hidden;
        }

        #bgCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            opacity: 0.5;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        header {
            text-align: center;
            padding: 1.5rem 0 1.5rem;
            border-bottom: 1px solid rgba(0, 0, 0, 0.06);
            margin-bottom: 2rem;
        }

        header h1 {
            font-size: 2.6rem;
            font-weight: 600;
            letter-spacing: -0.5px;
            color: #1e293b;
        }

        header h1 span {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        header p {
            color: #475569;
            font-size: 1.05rem;
            margin-top: 0.2rem;
        }

        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
            color: #64748b;
            padding: 0.6rem 1rem;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(4px);
            border-radius: 40px;
            margin-bottom: 2rem;
            border: 1px solid rgba(0, 0, 0, 0.04);
            flex-wrap: wrap;
        }

        .breadcrumb .current {
            font-weight: 600;
            color: #1e293b;
            background: #e2e8f0;
            padding: 0.1rem 0.8rem;
            border-radius: 30px;
        }

        .tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 0.6rem 1.6rem;
            border-radius: 40px;
            border: none;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(0, 0, 0, 0.06);
            font-size: 0.9rem;
            font-weight: 500;
            color: #475569;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.02);
            max-width: 220px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .tab-btn:hover {
            background: #ffffff;
            border-color: #b1c5e0;
            transform: translateY(-1px);
        }

        .tab-btn.active {
            background: #1e293b;
            color: #f8fafc;
            border-color: #1e293b;
            box-shadow: 0 4px 12px rgba(30, 41, 59, 0.15);
        }

        .tab-btn .badge-tab {
            display: inline-block;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            padding: 0 0.5rem;
            font-size: 0.7rem;
            margin-left: 0.4rem;
            font-weight: 400;
        }
        .tab-btn.active .badge-tab {
            background: rgba(255, 255, 255, 0.15);
        }

        /* ----- PRÉSENTATION DU PROJET ----- */
        .project-presentation {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(0, 0, 0, 0.04);
            border-radius: 20px;
            padding: 1.2rem 1.8rem;
            margin-bottom: 2rem;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.02);
        }

        .project-presentation h2 {
            font-size: 1.3rem;
            font-weight: 600;
            color: #0f172a;
            margin-bottom: 0.3rem;
        }

        .project-presentation .subtitle {
            font-size: 0.9rem;
            color: #475569;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .project-presentation .desc {
            font-size: 0.95rem;
            line-height: 1.6;
            color: #334155;
        }

        .project-presentation .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            margin-top: 0.6rem;
        }

        .project-presentation .tags span {
            background: rgba(59, 130, 246, 0.08);
            color: #3b82f6;
            padding: 0.15rem 0.7rem;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 500;
            border: 1px solid rgba(59, 130, 246, 0.06);
        }

        .search-wrap {
            display: flex;
            justify-content: center;
            margin-bottom: 2rem;
        }

        .search-wrap input {
            width: 100%;
            max-width: 500px;
            padding: 0.7rem 1.5rem;
            border-radius: 60px;
            border: 1px solid rgba(0, 0, 0, 0.08);
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(4px);
            color: #1e293b;
            font-size: 1rem;
            outline: none;
            transition: 0.25s;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.02);
        }

        .search-wrap input::placeholder {
            color: #94a3b8;
        }
        .search-wrap input:focus {
            border-color: #3b82f6;
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.08);
        }

        .doc-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 1.5rem;
        }

        .doc-card {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(0, 0, 0, 0.04);
            border-radius: 20px;
            padding: 1.5rem 1.6rem;
            transition: 0.25s ease;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.02);
        }

        .doc-card:hover {
            transform: translateY(-4px);
            border-color: #b1c5e0;
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.06);
        }

        .doc-card .folder-path {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: #64748b;
            background: rgba(0, 0, 0, 0.03);
            padding: 0.2rem 0.8rem;
            border-radius: 40px;
            display: inline-block;
            align-self: flex-start;
            margin-bottom: 0.5rem;
            border: 1px solid rgba(0, 0, 0, 0.04);
        }

        .doc-card .doc-name {
            font-size: 1.1rem;
            font-weight: 600;
            line-height: 1.3;
            margin-bottom: 0.4rem;
            word-break: break-word;
            color: #0f172a;
        }

        .doc-card .doc-name a {
            color: inherit;
            text-decoration: none;
            transition: 0.2s;
        }

        .doc-card .doc-name a:hover {
            color: #3b82f6;
        }

        .doc-card .summary {
            font-size: 0.92rem;
            line-height: 1.5;
            color: #334155;
            flex: 1;
            margin: 0.2rem 0 0.9rem;
        }

        .doc-card .summary .doc-type {
            display: inline-block;
            background: rgba(0, 0, 0, 0.04);
            padding: 0.05rem 0.6rem;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.75rem;
            color: #1e293b;
            margin-right: 0.3rem;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }

        .doc-card .summary .desc {
            display: block;
            margin-top: 0.3rem;
        }

        .doc-card .meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.78rem;
            color: #64748b;
            border-top: 1px solid rgba(0, 0, 0, 0.04);
            padding-top: 0.8rem;
            margin-top: 0.2rem;
        }

        .doc-card .meta .size {
            background: rgba(0, 0, 0, 0.02);
            padding: 0.15rem 0.7rem;
            border-radius: 30px;
        }

        .doc-card .meta .link-icon {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            color: #475569;
            text-decoration: none;
            transition: 0.2s;
            font-weight: 500;
        }

        .doc-card .meta .link-icon:hover {
            color: #3b82f6;
        }

        .doc-card .meta .link-icon svg {
            width: 16px;
            height: 16px;
            stroke: currentColor;
            stroke-width: 2;
            fill: none;
        }

        .status {
            text-align: center;
            padding: 4rem 1rem;
            color: #64748b;
            font-size: 1.05rem;
            grid-column: 1 / -1;
        }

        .status .spinner {
            display: inline-block;
            width: 32px;
            height: 32px;
            border: 3px solid rgba(0, 0, 0, 0.06);
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
            margin-bottom: 1rem;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .status .error-icon {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        .file-count {
            font-size: 0.8rem;
            color: #64748b;
            margin-left: 0.5rem;
            font-weight: 400;
        }

        @media (max-width: 640px) {
            body {
                padding: 1.2rem 0.8rem 3rem;
            }
            header h1 {
                font-size: 2rem;
            }
            .doc-grid {
                grid-template-columns: 1fr;
            }
            .tabs {
                justify-content: center;
            }
            .breadcrumb {
                font-size: 0.8rem;
                padding: 0.4rem 0.8rem;
            }
            .project-presentation {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>

    <canvas id="bgCanvas"></canvas>

    <div class="container">
        <header>
            <h1>📚 PBL · <span>Exploration complète</span></h1>
            <p>Organisation <strong>ldv78100ym-hub</strong> — Tous les dossiers et sous-dossiers</p>
            <p style="margin-top:0.5rem; color:#475569; font-size:0.95rem; max-width:600px; margin-left:auto; margin-right:auto;">
                Parcours récursif de l’intégralité des dépôts. Chaque fichier, où qu’il se trouve, est accessible.
            </p>
        </header>

        <!-- FIL D'ARIANE -->
        <nav class="breadcrumb" id="breadcrumb">
            <span class="current" id="currentFolder">Chargement…</span>
        </nav>

        <!-- ONGLETS (générés dynamiquement) -->
        <div class="tabs" id="tabContainer">
            <!-- Les onglets seront injectés par JavaScript -->
        </div>

        <!-- PRÉSENTATION DU PROJET -->
        <div id="projectPresentation" class="project-presentation">
            <!-- Rempli par JavaScript -->
        </div>

        <!-- RECHERCHE -->
        <div class="search-wrap">
            <input type="text" id="searchInput" placeholder="🔍  Rechercher dans tous les fichiers (nom, extension, contenu du résumé)…" />
        </div>

        <!-- GRILLE -->
        <div class="doc-grid" id="docGrid">
            <div class="status">
                <div class="spinner"></div>
                <div>Exploration des dépôts en cours…</div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            // ----- CONFIGURATION -----
            const GITHUB_USER = 'ldv78100ym-hub';
            const API_USER_URL = `https://api.github.com/users/${GITHUB_USER}/repos?per_page=100`;
            const API_TREE_URL = (repo) => `https://api.github.com/repos/${GITHUB_USER}/${repo}/git/trees/HEAD?recursive=1`;
            const BASE_RAW_URL = `https://raw.githubusercontent.com/${GITHUB_USER}/`;
            const BASE_PAGES_URL = `https://${GITHUB_USER}.github.io/`;

            // ----- ÉLÉMENTS DOM -----
            const grid = document.getElementById('docGrid');
            const searchInput = document.getElementById('searchInput');
            const tabContainer = document.getElementById('tabContainer');
            const currentFolderSpan = document.getElementById('currentFolder');
            const projectPresentationDiv = document.getElementById('projectPresentation');

            let allRepos = [];
            let allDocs = {}; // { repoName: [files] }
            let currentTab = null;
            let currentFileList = [];

            // ----- GÉNÉRATION D'UN RÉSUMÉ "VENDEUR" AVEC CONTEXTE DE CHEMIN -----
            function generateVendorSummary(fileName, filePath, repoName) {
                let cleanName = fileName.replace(/\.[^/.]+$/, "").replace(/_/g, " ");
                let ext = fileName.split('.').pop().toLowerCase();
                const lowerName = fileName.toLowerCase();
                const lowerPath = filePath.toLowerCase();

                // Détection du contexte du dossier (ex: docs/, seances/, images/, etc.)
                let context = '';
                const pathParts = filePath.split('/');
                if (pathParts.length > 1) {
                    // Prendre le nom du dossier parent
                    const parentFolder = pathParts[pathParts.length - 2];
                    if (parentFolder) {
                        context = ` (dossier \`${parentFolder}\`)`;
                    }
                }

                // Fichiers spéciaux (globaux)
                if (lowerName === "readme.md") {
                    return `📖 Guide principal du projet${context}. Présente la vision pédagogique, les objectifs et l'organisation. Indispensable pour une première immersion.`;
                }
                if (lowerName === "index.html" || lowerName === "index.htm") {
                    return `🌐 Page d'accueil du projet${context}. Accédez à l'interface web, aux démonstrations et aux outils interactifs.`;
                }
                if (lowerName === "contribution.md" || lowerName === "contributing.md") {
                    return `🤝 Guide de contribution${context}. Comment participer au projet, proposer des améliorations ou signaler des problèmes.`;
                }
                if (lowerName === "license" || lowerName === "license.md") {
                    return `📄 Licence du projet${context}. Précise les conditions d'utilisation, de partage et de modification des ressources.`;
                }

                // Détection par nom de dossier
                if (lowerPath.includes('/seance') || lowerPath.includes('/séance') || lowerPath.includes('/seances')) {
                    if (ext === "pdf" || ext === "docx" || ext === "odt") {
                        return `📝 Fiche séance détaillée pour « ${cleanName} »${context}. Prête à l'emploi, elle structure le cours et les activités des élèves.`;
                    }
                    if (ext === "html" || ext === "htm") {
                        return `🌐 Activité interactive pour la séance « ${cleanName} »${context}. Une ressource numérique pour engager les élèves.`;
                    }
                }

                if (lowerPath.includes('/bareme') || lowerPath.includes('/barème') || lowerPath.includes('/evaluation') || lowerPath.includes('/évaluation')) {
                    return `📊 Grille d'évaluation pour « ${cleanName} »${context}. Un outil clair pour une évaluation juste et transparente.`;
                }

                if (lowerPath.includes('/presentation') || lowerPath.includes('/présentation') || lowerPath.includes('/diapo')) {
                    return `📽️ Présentation du projet « ${cleanName} »${context}. Idéale pour informer et convaincre vos collègues ou les parents.`;
                }

                if (lowerPath.includes('/ressource') || lowerPath.includes('/fiche') || lowerPath.includes('/cours')) {
                    return `📚 Ressource pédagogique sur « ${cleanName} »${context}. Un support pour approfondir les notions clés.`;
                }

                if (lowerPath.includes('/outils') || lowerPath.includes('/tools')) {
                    return `🛠️ Fiche outil pour « ${cleanName} »${context}. Facilite la prise en main des logiciels ou du matériel.`;
                }

                if (lowerPath.includes('/communication') || lowerPath.includes('/preparatoire') || lowerPath.includes('/preparatoire')) {
                    return `📬 Document de communication pour « ${cleanName} »${context}. Permet d'informer les familles ou les élèves.`;
                }

                if (lowerPath.includes('/images') || lowerPath.includes('/img') || lowerPath.includes('/assets')) {
                    if (ext === "jpg" || ext === "jpeg" || ext === "png" || ext === "gif" || ext === "svg") {
                        return `🖼️ Ressource visuelle pour le projet${context}. Illustration, schéma ou photographie utilisée dans les supports.`;
                    }
                }

                // Extensions
                if (ext === "pdf") {
                    return `📄 Document PDF : « ${cleanName} »${context}. Une ressource à consulter pour enrichir votre pratique.`;
                }
                if (ext === "html" || ext === "htm") {
                    return `🌐 Page web interactive pour « ${cleanName} »${context}. Accédez aux simulations, démonstrations ou à l'interface du projet.`;
                }
                if (ext === "py") {
                    return `🐍 Script Python pour « ${cleanName} »${context}. Automatise les calculs, traite les données ou simule des phénomènes.`;
                }
                if (ext === "xlsx" || ext === "xls" || ext === "csv") {
                    return `📊 Fichier de données pour « ${cleanName} »${context}. Utilisez-le pour les activités de traitement de données et de statistiques.`;
                }
                if (ext === "json" || ext === "xml") {
                    return `📁 Fichier de données structurées${context}. Contient les informations nécessaires au fonctionnement du projet.`;
                }
                if (ext === "jpg" || ext === "jpeg" || ext === "png" || ext === "gif" || ext === "svg") {
                    return `🖼️ Image pour « ${cleanName} »${context}. Illustration, schéma ou photographie utilisée dans le projet.`;
                }
                if (ext === "mp4" || ext === "webm" || ext === "mov") {
                    return `🎥 Vidéo pour « ${cleanName} »${context}. Un support audiovisuel pour enrichir les apprentissages.`;
                }
                if (ext === "zip" || ext === "rar" || ext === "7z") {
                    return `📦 Archive compressée${context}. Contient l'ensemble des ressources du projet pour un téléchargement facilité.`;
                }

                // Fallback générique
                return `📎 Fichier « ${cleanName} »${context}. Une ressource du projet ${repoName} à découvrir.`;
            }

            function formatSize(bytes) {
                if (bytes === undefined || bytes === null) return '—';
                if (bytes < 1024) return bytes + ' o';
                if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' Ko';
                return (bytes / 1048576).toFixed(1) + ' Mo';
            }

            // ----- RÉCUPÉRATION DES DÉPÔTS -----
            async function fetchRepos() {
                try {
                    const resp = await fetch(API_USER_URL);
                    if (!resp.ok) throw new Error(`HTTP ${resp.status} — ${resp.statusText}`);
                    const data = await resp.json();
                    return data.filter(repo => !repo.fork);
                } catch (err) {
                    console.error('Erreur récupération dépôts:', err);
                    throw err;
                }
            }

            // ----- RÉCUPÉRATION RÉCURSIVE DU CONTENU (via Git Trees) -----
            async function fetchRepoContentsRecursive(repoName) {
                try {
                    const url = API_TREE_URL(repoName);
                    const resp = await fetch(url);
                    if (!resp.ok) {
                        if (resp.status === 404) return [];
                        throw new Error(`HTTP ${resp.status} — ${resp.statusText}`);
                    }
                    const data = await resp.json();
                    // data.tree contient tous les éléments (fichiers et dossiers)
                    // On filtre les blobs (fichiers)
                    const files = data.tree
                        .filter(item => item.type === 'blob')
                        .map(item => {
                            const fileName = item.path.split('/').pop();
                            return {
                                name: fileName,
                                path: item.path,
                                size: item.size,
                                sha: item.sha,
                                // Lien raw (on suppose la branche 'main')
                                download_url: `${BASE_RAW_URL}${repoName}/main/${item.path}`,
                                // Lien GitHub Pages (pour l'affichage des HTML)
                                html_url: `${BASE_PAGES_URL}${repoName}/${item.path}`
                            };
                        });
                    return files;
                } catch (err) {
                    console.error(`Erreur chargement arborescence de ${repoName}:`, err);
                    return [];
                }
            }

            // ----- AFFICHAGE DE LA PRÉSENTATION DU DÉPÔT -----
            function renderPresentation(repo) {
                if (!repo) {
                    projectPresentationDiv.innerHTML = `<div class="desc">Sélectionnez un dépôt pour voir sa présentation.</div>`;
                    return;
                }
                const topics = repo.topics || [];
                const lang = repo.language ? [repo.language] : [];
                const tags = [...topics, ...lang].slice(0, 6);
                const tagsHtml = tags.map(t => `<span>${t}</span>`).join('');
                const fileCount = allDocs[repo.name] ? allDocs[repo.name].length : 0;

                projectPresentationDiv.innerHTML = `
                    <h2>📂 ${repo.name} <span class="file-count">(${fileCount} fichiers)</span></h2>
                    <div class="subtitle">${repo.description || 'Aucune description fournie.'}</div>
                    ${repo.homepage ? `<div class="subtitle" style="color:#3b82f6;">🌐 <a href="${repo.homepage}" target="_blank">${repo.homepage}</a></div>` : ''}
                    <div class="tags">${tagsHtml || '<span>📌 Aucun tag</span>'}</div>
                `;
            }

            // ----- RENDU DE LA GRILLE -----
            function renderGrid(files, repoName) {
                if (!files || files.length === 0) {
                    grid.innerHTML = `
                        <div class="status">
                            <div style="font-size:2rem; margin-bottom:0.5rem;">📂</div>
                            <div>Ce dépôt ne contient aucun fichier.</div>
                            <div style="font-size:0.9rem; color:#94a3b8; margin-top:0.5rem;">L'arborescence est vide ou inaccessible.</div>
                        </div>
                    `;
                    return;
                }

                // Trier : d'abord README, index, puis les autres par chemin
                files.sort((a, b) => {
                    const aName = a.name.toLowerCase();
                    const bName = b.name.toLowerCase();
                    if (aName === 'readme.md') return -1;
                    if (bName === 'readme.md') return 1;
                    if (aName === 'index.html') return -1;
                    if (bName === 'index.html') return 1;
                    return a.path.localeCompare(b.path);
                });

                let html = '';
                for (const file of files) {
                    const summary = generateVendorSummary(file.name, file.path, repoName);
                    const safeName = file.name.replace(/</g, '&lt;').replace(/>/g, '&gt;');
                    const safeSummary = summary.replace(/</g, '&lt;').replace(/>/g, '&gt;');
                    const folderDisplay = file.path.replace('/' + file.name, '');

                    // Déterminer le type pour le badge
                    let type = 'Fichier';
                    const lowerName = file.name.toLowerCase();
                    const lowerPath = file.path.toLowerCase();
                    if (lowerName === 'readme.md') type = 'README';
                    else if (lowerName === 'index.html' || lowerName === 'index.htm') type = 'Accueil';
                    else if (file.name.endsWith('.pdf')) type = 'PDF';
                    else if (file.name.endsWith('.py')) type = 'Python';
                    else if (file.name.endsWith('.html') || file.name.endsWith('.htm')) type = 'HTML';
                    else if (file.name.endsWith('.csv') || file.name.endsWith('.xlsx')) type = 'Données';
                    else if (file.name.endsWith('.jpg') || file.name.endsWith('.png') || file.name.endsWith('.svg')) type = 'Image';
                    else if (file.name.endsWith('.mp4') || file.name.endsWith('.webm')) type = 'Vidéo';
                    else if (file.name.endsWith('.json') || file.name.endsWith('.xml')) type = 'Données';
                    else if (file.name.endsWith('.zip') || file.name.endsWith('.rar')) type = 'Archive';
                    else {
                        const ext = file.name.split('.').pop().toUpperCase();
                        if (ext.length < 6) type = ext;
                    }

                    // Lien : priorité à GitHub Pages pour les HTML, sinon raw
                    let fileUrl;
                    if (file.name.endsWith('.html') || file.name.endsWith('.htm')) {
                        fileUrl = file.html_url;
                    } else {
                        fileUrl = file.download_url;
                    }

                    html += `
                        <div class="doc-card">
                            <span class="folder-path">📁 ${folderDisplay || 'Racine'}</span>
                            <div class="doc-name">
                                <a href="${fileUrl}" target="_blank" rel="noopener">${safeName}</a>
                            </div>
                            <div class="summary">
                                <span class="doc-type">${type}</span>
                                <span class="desc">${safeSummary}</span>
                            </div>
                            <div class="meta">
                                <span class="size">${formatSize(file.size)}</span>
                                <a href="${fileUrl}" target="_blank" rel="noopener" class="link-icon">
                                    <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" />
                                        <polyline points="15 3 21 3 21 9" />
                                        <line x1="10" y1="14" x2="21" y2="3" />
                                    </svg>
                                    Ouvrir
                                </a>
                            </div>
                        </div>
                    `;
                }
                grid.innerHTML = html;
            }

            // ----- CHARGEMENT D'UN DÉPÔT -----
            async function loadRepo(repoName) {
                currentTab = repoName;
                const tabs = document.querySelectorAll('.tab-btn');
                tabs.forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.repo === repoName);
                });
                currentFolderSpan.textContent = repoName;

                grid.innerHTML = `
                    <div class="status">
                        <div class="spinner"></div>
                        <div>Parcours de l'arborescence de ${repoName}…</div>
                    </div>
                `;

                let files = allDocs[repoName];
                if (!files) {
                    files = await fetchRepoContentsRecursive(repoName);
                    allDocs[repoName] = files;
                }
                currentFileList = files;

                const repo = allRepos.find(r => r.name === repoName);
                renderPresentation(repo);
                renderGrid(files, repoName);
            }

            // ----- CHARGEMENT DE TOUS LES DÉPÔTS -----
            async function init() {
                try {
                    allRepos = await fetchRepos();
                    if (!allRepos || allRepos.length === 0) {
                        grid.innerHTML = `
                            <div class="status">
                                <div class="error-icon">📭</div>
                                <div>Aucun dépôt trouvé pour l'utilisateur ${GITHUB_USER}.</div>
                            </div>
                        `;
                        return;
                    }
                    allRepos.sort((a, b) => a.name.localeCompare(b.name));

                    let tabsHtml = '';
                    allRepos.forEach((repo, index) => {
                        const isActive = index === 0 ? 'active' : '';
                        tabsHtml += `
                            <button class="tab-btn ${isActive}" data-repo="${repo.name}">
                                📂 ${repo.name}
                            </button>
                        `;
                    });
                    tabContainer.innerHTML = tabsHtml;

                    document.querySelectorAll('.tab-btn').forEach(btn => {
                        btn.addEventListener('click', function() {
                            const repoName = this.dataset.repo;
                            if (repoName !== currentTab) {
                                loadRepo(repoName);
                            }
                        });
                    });

                    // Chargement initial
                    const firstRepo = allRepos[0];
                    await loadRepo(firstRepo.name);

                    // Préchargement en arrière-plan des autres dépôts
                    for (let i = 1; i < allRepos.length; i++) {
                        const repo = allRepos[i];
                        if (!allDocs[repo.name]) {
                            fetchRepoContentsRecursive(repo.name).then(files => {
                                allDocs[repo.name] = files;
                            }).catch(err => console.warn(`Préchargement échoué pour ${repo.name}`, err));
                        }
                    }

                } catch (err) {
                    grid.innerHTML = `
                        <div class="status">
                            <div class="error-icon">⚠️</div>
                            <div style="font-weight:600; color:#b91c1c;">Impossible de charger les dépôts</div>
                            <div style="font-size:0.9rem; color:#64748b; margin-top:0.5rem;">${err.message}</div>
                        </div>
                    `;
                }
            }

            // ----- RECHERCHE -----
            let debounceTimer;
            searchInput.addEventListener('input', function() {
                clearTimeout(debounceTimer);
                debounceTimer = setTimeout(() => {
                    const query = this.value.toLowerCase().trim();
                    if (!currentTab) return;
                    const files = allDocs[currentTab] || [];
                    if (!query) {
                        renderGrid(files, currentTab);
                        return;
                    }
                    const filtered = files.filter(file => {
                        const summary = generateVendorSummary(file.name, file.path, currentTab);
                        return file.name.toLowerCase().includes(query) ||
                            file.path.toLowerCase().includes(query) ||
                            summary.toLowerCase().includes(query);
                    });
                    renderGrid(filtered, currentTab);
                }, 200);
            });

            // ----- CANVAS (particules) -----
            function initCanvas() {
                const canvas = document.getElementById('bgCanvas');
                const ctx = canvas.getContext('2d');
                let w, h;
                let particles = [];
                const COUNT = 50;
                const MAX_SPEED = 0.2;

                function resize() {
                    w = canvas.width = window.innerWidth;
                    h = canvas.height = window.innerHeight;
                }

                function createParticles() {
                    particles = [];
                    for (let i = 0; i < COUNT; i++) {
                        particles.push({
                            x: Math.random() * w,
                            y: Math.random() * h,
                            vx: (Math.random() - 0.5) * MAX_SPEED * 2,
                            vy: (Math.random() - 0.5) * MAX_SPEED * 2,
                            r: 1.5 + Math.random() * 2.5,
                            a: 0.10 + Math.random() * 0.15
                        });
                    }
                }

                function draw() {
                    ctx.clearRect(0, 0, w, h);

                    for (const p of particles) {
                        p.x += p.vx;
                        p.y += p.vy;

                        if (p.x < 0 || p.x > w) p.vx *= -1;
                        if (p.y < 0 || p.y > h) p.vy *= -1;

                        ctx.beginPath();
                        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                        ctx.fillStyle = `rgba(59, 130, 246, ${p.a})`;
                        ctx.fill();
                    }

                    for (let i = 0; i < particles.length; i++) {
                        for (let j = i + 1; j < particles.length; j++) {
                            const dx = particles[i].x - particles[j].x;
                            const dy = particles[i].y - particles[j].y;
                            const dist = Math.sqrt(dx * dx + dy * dy);
                            if (dist < 120) {
                                const alpha = (1 - dist / 120) * 0.08;
                                ctx.beginPath();
                                ctx.moveTo(particles[i].x, particles[i].y);
                                ctx.lineTo(particles[j].x, particles[j].y);
                                ctx.strokeStyle = `rgba(59, 130, 246, ${alpha})`;
                                ctx.lineWidth = 0.5;
                                ctx.stroke();
                            }
                        }
                    }

                    requestAnimationFrame(draw);
                }

                window.addEventListener('resize', () => {
                    resize();
                    createParticles();
                });

                resize();
                createParticles();
                draw();
            }

            // ----- LANCEMENT -----
            init();
            initCanvas();

        })();
    </script>

</body>
